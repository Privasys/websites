name: E2E — Developer Portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/fronts/developer.privasys.org/**'
      - 'libs/**'
  pull_request:
    paths:
      - 'apps/fronts/developer.privasys.org/**'
      - 'libs/**'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        type: choice
        default: portal
        options:
          - portal
          - fast-verify
          - all

jobs:
  e2e-portal:
    name: Portal Tests
    runs-on: ubuntu-latest
    # Run inside Playwright's official image: the browsers and all their
    # system dependencies are prebaked, so there is no `playwright
    # install --with-deps` step. That apt step began hanging (until the
    # 15-min job timeout) when ubuntu-latest moved to 24.04 — it blocked
    # on the runner's apt/dpkg lock — leaving this job red on main for
    # weeks without ever running a test. Keep the tag in sync with the
    # `@playwright/test` version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --immutable

      # Playwright browsers + OS deps are already present in the image.

      - name: Restore FIDO2 test identity
        run: |
          mkdir -p apps/fronts/developer.privasys.org/e2e/.auth
          echo "$E2E_FIDO2_IDENTITY" | base64 -d > apps/fronts/developer.privasys.org/e2e/.auth/fido2-privasys.id.json
        env:
          E2E_FIDO2_IDENTITY: ${{ secrets.E2E_FIDO2_IDENTITY }}

      - name: Determine spec files
        id: specs
        run: |
          SUITE="${{ github.event.inputs.suite || 'portal' }}"
          if [ "$SUITE" = "all" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
          elif [ "$SUITE" = "fast-verify" ]; then
            echo "files=fast-verify.spec.ts" >> "$GITHUB_OUTPUT"
          else
            echo "files=portal.spec.ts" >> "$GITHUB_OUTPUT"
          fi

      - name: Run portal e2e tests
        run: |
          npx playwright test \
            --config=apps/fronts/developer.privasys.org/e2e/playwright.config.ts \
            --project=portal \
            ${{ steps.specs.outputs.files }} \
            --reporter=list
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portal-test-results
          path: apps/fronts/developer.privasys.org/e2e/test-results/
          retention-days: 7
