name: E2E — Developer Portal

# DISABLED: Auto-triggers are off because the tests log into real GitHub
# via username/password, which triggers device verification from CI runner
# IPs. Until the auth approach is changed (e.g. use a PAT or mock auth),
# this workflow can only run manually with someone providing the OTP.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/fronts/developer.privasys.org/**'
  #     - 'libs/**'
  # pull_request:
  #   paths:
  #     - 'apps/fronts/developer.privasys.org/**'
  #     - 'libs/**'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        type: choice
        default: portal
        options:
          - portal
          - fast-verify
          - all

jobs:
  e2e-portal:
    name: Portal Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Determine spec files
        id: specs
        run: |
          SUITE="${{ github.event.inputs.suite || 'portal' }}"
          if [ "$SUITE" = "all" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
          elif [ "$SUITE" = "fast-verify" ]; then
            echo "files=fast-verify.spec.ts" >> "$GITHUB_OUTPUT"
          else
            echo "files=portal.spec.ts" >> "$GITHUB_OUTPUT"
          fi

      - name: Run portal e2e tests
        run: |
          npx playwright test \
            --config=apps/fronts/developer.privasys.org/e2e/playwright.config.ts \
            --project=portal \
            ${{ steps.specs.outputs.files }} \
            --reporter=list
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portal-test-results
          path: apps/fronts/developer.privasys.org/e2e/test-results/
          retention-days: 7
