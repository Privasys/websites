name: E2E — Explorer

on:
  push:
    branches: [main]
    paths:
      - 'apps/fronts/explorer.privasys.org/**'
      - 'libs/**'
  pull_request:
    paths:
      - 'apps/fronts/explorer.privasys.org/**'
      - 'libs/**'
  workflow_dispatch:

jobs:
  e2e-explorer:
    name: Explorer Tests
    runs-on: ubuntu-latest
    # See e2e-portal.yml: run in Playwright's official image so there is
    # no `playwright install --with-deps` apt step (it hangs on the
    # ubuntu-24.04 runner's apt lock). Keep the tag in sync with the
    # `@playwright/test` version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --immutable

      # Playwright browsers + OS deps are already present in the image.

      - name: Run explorer e2e tests
        run: |
          npx playwright test \
            --config=apps/fronts/explorer.privasys.org/e2e/playwright.config.ts \
            explorer.spec.ts \
            --reporter=list

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: explorer-test-results
          path: apps/fronts/explorer.privasys.org/e2e/test-results/
          retention-days: 7
