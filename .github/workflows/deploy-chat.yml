name: Deploy Chat to OVH

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        default: test
        options:
          - test
          - prod

concurrency:
  group: deploy-chat-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_TELEMETRY_DISABLED: 1
      AWS_ACCESS_KEY_ID: ${{ secrets.NX_CACHE_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.NX_CACHE_AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve target config
        id: target
        run: |
          set -euo pipefail
          ENV='${{ github.event.inputs.environment }}'
          if [[ "$ENV" == 'prod' ]]; then
            echo "container=chat-prod"                          >> "$GITHUB_OUTPUT"
            echo "host_port=3010"                               >> "$GITHUB_OUTPUT"
            echo "env_file=~/chat.env"                          >> "$GITHUB_OUTPUT"
            # Production chat currently points at the same dev AI backend
            # as chat-test (api-test.developer.privasys.org). Switch to
            # api.developer.privasys.org once a dedicated prod gateway is
            # provisioned with the inference VM.
            echo "api_url=https://api-test.developer.privasys.org" >> "$GITHUB_OUTPUT"
            echo "default_instance=demo"                        >> "$GITHUB_OUTPUT"
            # No dedicated chat-service back-end in prod yet: leave the
            # chat-service URL empty so BYO-MCP stays fully dormant there.
            echo "chat_service_url="                            >> "$GITHUB_OUTPUT"
          else
            echo "container=chat"                                  >> "$GITHUB_OUTPUT"
            echo "host_port=3011"                                  >> "$GITHUB_OUTPUT"
            echo "env_file=~/chat-test.env"                        >> "$GITHUB_OUTPUT"
            echo "api_url=https://api-test.developer.privasys.org" >> "$GITHUB_OUTPUT"
            echo "default_instance=demo"                           >> "$GITHUB_OUTPUT"
            # BYO-MCP back-end: the real chat-service enclave app (user tool
            # store + signed tool-grant + JWKS). The browser reaches it over a
            # DEDICATED sealed session (bearer inside the envelope) and the
            # wallet vouchers it alongside the inference enclave in one ceremony
            # (multi-app attestation).
            echo "chat_service_url=https://chat-service.apps-test.privasys.org" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$(date -u +%Y%m%d-%H%M%S)-${ENV}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --network-timeout 1000000 --immutable

      - name: Build chat
        run: |
          set -euo pipefail
          {
            echo "NEXT_PUBLIC_API_BASE_URL=${{ steps.target.outputs.api_url }}"
            echo "NEXT_PUBLIC_DEFAULT_INSTANCE=${{ steps.target.outputs.default_instance }}"
            echo "NEXT_PUBLIC_CHAT_SERVICE_URL=${{ steps.target.outputs.chat_service_url }}"
            # Build provenance shown bottom-left in the sidebar (links to
            # the exact commit on GitHub).
            echo "NEXT_PUBLIC_COMMIT_SHA=${GITHUB_SHA}"
            echo "NEXT_PUBLIC_APP_VERSION=$(node -p "require('./apps/fronts/chat.privasys.org/package.json').version")"
          } > apps/fronts/chat.privasys.org/.env.local
          npx nx reset
          npx nx build chat.privasys.org --skip-nx-cache

      - name: Assemble build context
        run: |
          set -euo pipefail
          DIST=dist/apps/fronts/chat.privasys.org/.next
          APP=apps/fronts/chat.privasys.org
          rm -rf /tmp/chat-build
          mkdir -p /tmp/chat-build
          cp -r "$DIST/standalone" /tmp/chat-build/standalone
          cp -r "$DIST/static"     /tmp/chat-build/static
          cp -r "$APP/public"      /tmp/chat-build/public
          cp    "$APP/Dockerfile"  /tmp/chat-build/Dockerfile

      - name: Configure SSH
        env:
          OVH_SSH_KEY: ${{ secrets.OVH_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$OVH_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.OVH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Stream build context to OVH and build image
        env:
          OVH_HOST: ${{ secrets.OVH_HOST }}
          OVH_USER: ${{ secrets.OVH_USER }}
          OVH_SSH_PORT: ${{ secrets.OVH_SSH_PORT }}
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          PORT="${OVH_SSH_PORT:-22}"
          cd /tmp/chat-build
          tar -cf - standalone static public Dockerfile | \
            ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${OVH_USER}@${OVH_HOST}" \
              "set -euo pipefail; mkdir -p ~/chat-builds/${TAG} && cd ~/chat-builds/${TAG} && tar -xf - && sudo docker build -t chat:${TAG} ."

      - name: Swap container
        env:
          OVH_HOST: ${{ secrets.OVH_HOST }}
          OVH_USER: ${{ secrets.OVH_USER }}
          OVH_SSH_PORT: ${{ secrets.OVH_SSH_PORT }}
          TAG: ${{ steps.target.outputs.tag }}
          CONTAINER: ${{ steps.target.outputs.container }}
          HOST_PORT: ${{ steps.target.outputs.host_port }}
          ENV_FILE: ${{ steps.target.outputs.env_file }}
        run: |
          set -euo pipefail
          PORT="${OVH_SSH_PORT:-22}"
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${OVH_USER}@${OVH_HOST}" "set -euo pipefail; \
            sudo docker stop ${CONTAINER} 2>/dev/null || true; \
            sudo docker rm   ${CONTAINER} 2>/dev/null || true; \
            sudo docker run -d --name ${CONTAINER} --restart unless-stopped \
              -p ${HOST_PORT}:3000 \
              --env-file ${ENV_FILE} \
              chat:${TAG}"

      - name: Smoke test (root + instance redirect)
        env:
          OVH_HOST: ${{ secrets.OVH_HOST }}
          OVH_USER: ${{ secrets.OVH_USER }}
          OVH_SSH_PORT: ${{ secrets.OVH_SSH_PORT }}
          CONTAINER: ${{ steps.target.outputs.container }}
          HOST_PORT: ${{ steps.target.outputs.host_port }}
        run: |
          set -euo pipefail
          PORT="${OVH_SSH_PORT:-22}"
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${OVH_USER}@${OVH_HOST}" "set -euo pipefail; \
            ROOT=\$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:${HOST_PORT}/); \
            echo root=\$ROOT; \
            test \"\$ROOT\" = '307' -o \"\$ROOT\" = '308' -o \"\$ROOT\" = '200' || { echo 'root failed'; sudo docker logs ${CONTAINER} --tail 50; exit 1; }"

      # Post-deploy smoke against the API the chat actually points at:
      # mirrors the "Security view" rows the user sees in chat-test/i/demo.
      # Catches the failure modes that hit prod:
      #   - a tool silently dropping out of available_tools[] (Brave Search vanish)
      #   - an enclave /attest returning 502 (stale gateway_host after Spot rotation)
      #   - /attest returning a malformed body (missing quote.raw_base64 or certificate)
      # verify-quote (deep TDX/SGX ECDSA check) is not run here because the
      # CI runner has no SA bearer token; the spec degrades to shape-only.
      - name: Smoke test (chat attestations - api shape)
        if: always() && steps.target.outputs.api_url != ''
        env:
          CHAT_API_BASE: ${{ steps.target.outputs.api_url }}
          CHAT_INSTANCE_API: ${{ steps.target.outputs.api_url }}/api/v1/ai/instances/${{ steps.target.outputs.default_instance }}
        run: |
          set -euo pipefail
          # Playwright browsers aren't needed (API-only spec) but the
          # runner is required. yarn install already provided it.
          npx playwright test \
            --config apps/fronts/developer.privasys.org/e2e/playwright.config.ts \
            chat-attestations-green.spec.ts \
            --project=chat-attestations-green \
            --no-deps

      - name: Prune old build directories on OVH (keep last 5)
        if: always()
        env:
          OVH_HOST: ${{ secrets.OVH_HOST }}
          OVH_USER: ${{ secrets.OVH_USER }}
          OVH_SSH_PORT: ${{ secrets.OVH_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${OVH_SSH_PORT:-22}"
          ssh -p "$PORT" -i ~/.ssh/id_ed25519 "${OVH_USER}@${OVH_HOST}" \
            "ls -1t ~/chat-builds 2>/dev/null | tail -n +6 | xargs -r -I{} rm -rf ~/chat-builds/{}" || true
