<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34E89E"/>
      <stop offset="1" stop-color="#00BCF2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#F4F7FA"/>

  <rect x="120" y="104" width="40" height="40" rx="11" fill="url(#brand)"/>
  <text x="180" y="132" font-size="26" font-weight="700" letter-spacing="2" fill="#5B7185">PRIVASYS IDENTITY VERIFIER</text>

  <text x="120" y="262" font-size="78" font-weight="800" fill="#0B1F33">Attested, auditable code</text>
  <text x="120" y="330" font-size="36" fill="#5B7185">A relying party verifies the signature and the enclave attestation, not an operator's word.</text>

  <!-- big seal -->
  <g transform="translate(360 600)">
    <circle r="170" fill="#FFFFFF" stroke="#E2EAF1" stroke-width="2"/>
    <circle r="120" fill="url(#brand)"/>
    <path d="M-44 4l30 30 64-70" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="150" font-size="26" font-weight="700" fill="#5B7185" text-anchor="middle">Remote attestation</text>
  </g>

  <!-- checklist -->
  <g transform="translate(720 470)">
    <g>
      <circle cx="22" cy="22" r="22" fill="#EAF7F0"/>
      <path d="M12 23l7 7 13-15" fill="none" stroke="#16A34A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="20" font-size="34" font-weight="700" fill="#0B1F33">Published, reviewable code</text>
      <text x="64" y="56" font-size="26" fill="#5B7185">Pinned by image digest, not a black box.</text>
    </g>
    <g transform="translate(0 110)">
      <circle cx="22" cy="22" r="22" fill="#EAF7F0"/>
      <path d="M12 23l7 7 13-15" fill="none" stroke="#16A34A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="20" font-size="34" font-weight="700" fill="#0B1F33">Verifiable signing key</text>
      <text x="64" y="56" font-size="26" fill="#5B7185">Claims checked against the published JWKS.</text>
    </g>
    <g transform="translate(0 220)">
      <circle cx="22" cy="22" r="22" fill="#EAF7F0"/>
      <path d="M12 23l7 7 13-15" fill="none" stroke="#16A34A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="20" font-size="34" font-weight="700" fill="#0B1F33">Attested trust anchors</text>
      <text x="64" y="56" font-size="26" fill="#5B7185">ICAO master list in force is pinned in the certificate.</text>
    </g>
  </g>

  <text x="120" y="824" font-size="30" font-style="italic" fill="#8497A8">Privacy that is verifiable, not promised.</text>
</svg>
