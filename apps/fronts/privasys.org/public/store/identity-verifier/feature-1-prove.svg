<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34E89E"/>
      <stop offset="1" stop-color="#00BCF2"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#F4F7FA"/>

  <!-- eyebrow -->
  <rect x="120" y="104" width="40" height="40" rx="11" fill="url(#brand)"/>
  <text x="180" y="132" font-size="26" font-weight="700" letter-spacing="2" fill="#5B7185">PRIVASYS IDENTITY VERIFIER</text>

  <!-- headline -->
  <text x="120" y="262" font-size="78" font-weight="800" fill="#0B1F33">Prove it without revealing it</text>
  <text x="120" y="330" font-size="36" fill="#5B7185">Share a passport-certified yes or no. Your date of birth never leaves your device.</text>

  <!-- request card -->
  <rect x="120" y="470" width="600" height="300" rx="28" fill="#FFFFFF" stroke="#E2EAF1" stroke-width="2"/>
  <text x="160" y="540" font-size="26" font-weight="700" letter-spacing="1" fill="#8497A8">A SERVICE ASKS</text>
  <text x="160" y="612" font-size="44" font-weight="700" fill="#0B1F33">Are you 18 or older?</text>
  <rect x="160" y="664" width="520" height="64" rx="14" fill="#F1F4F8"/>
  <text x="184" y="704" font-size="28" fill="#9AAAB8">Date of birth</text>
  <text x="600" y="704" font-size="28" font-weight="700" fill="#C2CDD8">hidden</text>
  <line x1="184" y1="696" x2="430" y2="696" stroke="#C2CDD8" stroke-width="3"/>

  <!-- arrow -->
  <path d="M748 620h96" stroke="#9AAAB8" stroke-width="8" stroke-linecap="round"/>
  <path d="M832 600l28 20-28 20" fill="none" stroke="#9AAAB8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- answer card -->
  <rect x="880" y="470" width="600" height="300" rx="28" fill="#FFFFFF" stroke="#E2EAF1" stroke-width="2"/>
  <circle cx="968" cy="600" r="56" fill="#16A34A"/>
  <path d="M941 601l18 18 36-40" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1052" y="592" font-size="52" font-weight="800" fill="#0B1F33">Yes, over 18</text>
  <text x="1052" y="640" font-size="28" fill="#5B7185">passport-certified</text>
  <rect x="912" y="692" width="536" height="48" rx="12" fill="#EAF7F0"/>
  <text x="936" y="724" font-size="26" fill="#2E8B63">Signed claim, bound to this service, expires in minutes.</text>
</svg>
