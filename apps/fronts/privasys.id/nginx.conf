server {
    listen 80;
    listen [::]:80;
    server_name privasys.id;

    root /var/websites/privasys.id;
    index index.html;

    location /.well-known/apple-app-site-association {
        default_type application/json;
    }

    location /.well-known/assetlinks.json {
        default_type application/json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
